<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BiteBox - Signup</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="logo-container">
    <img src="Bitebox.png" alt="BiteBox Logo">
  </div>

  <header class="top-section">
    <h2>Welcome, Let’s Create Your Account</h2>
  </header>

  <main class="bottom-section">
    <h1 class="page-title">Create New Account</h1>
    <form id="signupForm" class="form-fields">
      <label for="username">Username</label>
      <input id="username" type="text" placeholder="Enter username" required>

      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Enter password" required>

      <button type="submit" class="btn">Signup</button>
    </form>
    <p class="redirect-text">
      Already have an account? <a href="login.html">Login here</a>
    </p>
  </main>
  <script src="signup.js"></script>
</body>
</html>
