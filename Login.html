<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BiteBox - Login</title>
  <link rel="stylesheet" href="style.css">
  <script src="login.js"></script>
</head>
<body>
  <div class="logo-container">
    <img src="Bitebox.png" alt="BiteBox Logo">
  </div>

  <header class="top-section">
    <h2>Welcome Back, Please Login</h2>
  </header>

  <main class="bottom-section">
    <h1 class="page-title">Login to Your Account</h1>
    <form id="loginForm" class="form-fields">
      <label for="username">Username</label>
      <input id="username" type="text" placeholder="Enter username" required>

      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Enter password" required>

      <button type="submit" class="btn">Login</button>
    </form>
    <p class="redirect-text">
      New user? <a href="signup.html">Signup here</a>
    </p>
  </main>
  <script src="login.js"></script>
</body>
</html>
